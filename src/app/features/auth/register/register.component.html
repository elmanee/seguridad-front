<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card border-0 shadow-lg p-4" style="width: 100%; max-width: 450px; border-radius: 25px;">
    
    <div class="text-center mb-4">
      <h2 class="fw-bold">Crear Cuenta!</h2>
      <p class="text-muted">Únete a TASK PRO</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label small fw-bold">Nombre</label>
          <input type="text" formControlName="name" class="form-control bg-light border-0 py-2" placeholder="Juan" style="border-radius: 10px;">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label small fw-bold">Apellido</label>
          <input type="text" formControlName="lastname" class="form-control bg-light border-0 py-2" placeholder="Perez" style="border-radius: 10px;">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-bold">Nombre de usuario</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-0" style="border-radius: 10px 0 0 10px;">
            <i class="fa-solid fa-user text-muted"></i>
          </span>
          <input 
            type="text" 
            formControlName="username" 
            class="form-control bg-light border-0 py-2" 
            placeholder="juan_perez"
            style="border-radius: 0 10px 10px 0;">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-bold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-0" style="border-radius: 10px 0 0 10px;">
            <i class="fa-solid fa-lock text-muted"></i>
          </span>
          <input 
            [type]="hidePassword ? 'password' : 'text'" 
            formControlName="password" 
            class="form-control bg-light border-0 py-2" 
            placeholder="••••••••">
          <button 
            type="button" 
            class="input-group-text bg-light border-0" 
            (click)="togglePassword()"
            style="border-radius: 0 10px 10px 0;">
            <i class="fa-solid text-muted" [ngClass]="hidePassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>

      <button 
        type="submit" 
        [disabled]="registerForm.invalid" 
        class="btn btn-primary w-100 fw-bold py-2 mb-3 shadow-sm" style="border-radius: 12px;">
        REGISTRARSE AHORA
      </button>

      <div class="text-center">
        <span class="text-muted small">¿Ya tienes cuenta? </span>
        <a routerLink="/login" class="text-primary small fw-bold text-decoration-none">Inicia sesión</a>
      </div>

    </form>
  </div>
</div>
