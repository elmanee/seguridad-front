<div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
  <div class="card border-0 shadow-lg p-4 p-md-5" style="width: 100%; max-width: 620px; margin-top: 2rem;">

    <div class="text-center mb-5">
      <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-circle mb-4 shadow-sm" style="width: 70px; height: 70px;">
        <i class="fa-solid fa-user-plus text-primary fs-3"></i>
      </div>
      <h2 class="fw-700 mb-2" style="letter-spacing: -1px; color: var(--text-main);">Crea tu cuenta</h2>
      <p style="color: var(--text-muted); font-size: 1rem;">Únete a TASKPRO y organiza tus proyectos.</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label small fw-700 mb-2 ms-1 text-muted text-uppercase" style="letter-spacing: 0.5px;">Nombre</label>
          <input type="text" formControlName="name" class="form-control" placeholder="Ej. Juan">
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-700 mb-2 ms-1 text-muted text-uppercase" style="letter-spacing: 0.5px;">Apellido</label>
          <input type="text" formControlName="lastname" class="form-control" placeholder="Ej. Pérez">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-700 mb-2 ms-1 text-muted text-uppercase" style="letter-spacing: 0.5px;">Usuario</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="fa-solid fa-at small"></i>
          </span>
          <input
            type="text"
            formControlName="username"
            class="form-control" 
            placeholder="usuario_id">
        </div>
      </div>

      <div class="mb-5">
        <label class="form-label small fw-700 mb-2 ms-1 text-muted text-uppercase" style="letter-spacing: 0.5px;">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="fa-solid fa-key small"></i>
          </span>
          <input
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            class="form-control"
            placeholder="••••••••">
          <button
            type="button"
            class="bg-white px-3 border-0 text-muted"
            (click)="togglePassword()">
            <i class="fa-solid fa-fw" [ngClass]="hidePassword ? 'fa-eye-slash' : 'fa-eye'" style="font-size: 0.85rem;"></i>
          </button>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="registerForm.invalid"
        class="btn btn-primary w-100 py-3 mb-4 shadow"
        style="letter-spacing: 0.5px; font-size: 1.05rem;">
        REGISTRARSE AHORA
      </button>

      <div class="text-center">
        <p class="mb-0 text-muted small">
          ¿Ya tienes cuenta?
          <a routerLink="/login" class="text-primary fw-bold text-decoration-none ms-1">Inicia sesión</a>
        </p>
      </div>

    </form>
  </div>
</div>
