<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="fw-bold m-0">Mis Pendientes 📝</h2>
    <button class="btn btn-primary shadow-sm px-4" 
            data-bs-toggle="modal" 
            data-bs-target="#taskModal" 
            (click)="openCreate()">
      <i class="fa-solid fa-plus me-2"></i>Nueva Tarea
    </button>
  </div>

  <div class="row">
    @for (task of tasks; track task.id) {
      <div class="col-md-6 col-lg-4 mb-4">
        <div class="card h-100 border-0 shadow-sm" style="border-radius: 15px;">
          <div class="card-body p-4">
            <h5 class="fw-bold">{{ task.name }}</h5>
            <p class="text-muted small">{{ task.description }}</p>
            
            <div class="d-flex justify-content-between align-items-center mt-4">
              <span class="badge" [class.bg-danger]="task.priority" [class.bg-info]="!task.priority">
                {{ task.priority ? 'Urgente' : 'Normal' }}
              </span>
              
              <div class="btn-group">
                <button class="btn btn-outline-primary btn-sm border-0" 
                        data-bs-toggle="modal" 
                        data-bs-target="#taskModal" 
                        (click)="openEdit(task)">
                  <i class="fa-solid fa-pen-to-square"></i>
                </button>
                <button class="btn btn-outline-danger btn-sm border-0" 
                        (click)="deleteTask(task.id)">
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>

<div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
      <div class="modal-header border-0 pt-4 px-4">
        <h5 class="modal-title fw-bold">{{ isEditing ? 'Editar Tarea' : 'Nueva Tarea' }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form [formGroup]="taskForm" (ngSubmit)="saveTask()">
          <div class="mb-3">
            <label class="form-label fw-bold small">Nombre</label>
            <input type="text" formControlName="name" class="form-control bg-light border-0" placeholder="¿Qué hay que hacer?">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Descripción</label>
            <textarea formControlName="description" class="form-control bg-light border-0" rows="3"></textarea>
          </div>
          <div class="mb-4">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" formControlName="priority" id="modalPrio">
              <label class="form-check-label small" for="modalPrio">Prioridad Alta</label>
            </div>
          </div>
          <button type="submit" [disabled]="taskForm.invalid" data-bs-dismiss="modal" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">
            {{ isEditing ? 'Actualizar' : 'Guardar' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
