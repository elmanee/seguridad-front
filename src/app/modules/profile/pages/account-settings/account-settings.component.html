<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="mb-5 d-flex align-items-center gap-3">
  <i class="fa-solid fa-user-gear text-primary" style="font-size: 2.5rem; filter: drop-shadow(0 2px 4px rgba(24, 144, 255, 0.2));"></i>

  <div class="text-start">
    <h2 class="fw-700 mb-0" style="letter-spacing: -0.5px; color: var(--text-main);">Configuración de Perfil</h2>
    <p class="mb-0 text-muted small">Gestiona tu información personal y cuenta.</p>
  </div>
</div>

      <div class="card border-0 p-4 p-md-5 mb-5 shadow-lg">
        <h5 class="fw-bold mb-4 d-flex align-items-center gap-2" style="color: var(--text-main);">
          <i class="fa-solid fa-user-pen text-primary opacity-75"></i>
          Información Personal
        </h5>

        <form [formGroup]="profileForm" (ngSubmit)="onUpdate()">
          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label small fw-700 text-uppercase mb-2 ms-1 text-muted" style="letter-spacing: 0.5px;">Nombre</label>
              <input type="text" formControlName="name" class="form-control" placeholder="Escribe tu nombre">
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-700 text-uppercase mb-2 ms-1 text-muted" style="letter-spacing: 0.5px;">Apellido</label>
              <input type="text" formControlName="lastname" class="form-control" placeholder="Escribe tu apellido">
            </div>
          </div>

          <div class="mt-4">
            <label class="form-label small fw-700 text-uppercase mb-2 ms-1 text-muted" style="letter-spacing: 0.5px;">Usuario</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="fa-solid fa-at small"></i>
              </span>
              <input type="text" formControlName="username" class="form-control bg-light">
            </div>
          </div>

          <div class="mt-4 mb-5">
            <label class="form-label small fw-700 text-uppercase mb-2 ms-1 text-muted" style="letter-spacing: 0.5px;">Actualizar Contraseña</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="fa-solid fa-key small"></i>
              </span>
              <input type="password" formControlName="password" class="form-control" placeholder="Dejar vacío para no cambiar">
            </div>
          </div>

          <div class="d-flex justify-content-end">
            <button type="submit" [disabled]="!isFormChanged || profileForm.invalid"
                    class="btn btn-primary px-5 py-3 shadow">
              GUARDAR CAMBIOS
            </button>
          </div>
        </form>
      </div>

      <div class="card border-0 p-4 p-md-5" style="background: rgba(255, 77, 79, 0.02); border: 1px dashed rgba(255, 77, 79, 0.2) !important; border-radius: var(--border-radius-xl) !important;">
        <div class="d-flex align-items-center mb-4 text-danger">
          <div class="rounded-circle bg-danger bg-opacity-10 d-flex align-items-center justify-content-center me-3" style="width: 45px; height: 45px;">
            <i class="fa-solid fa-trash-can fs-5"></i>
          </div>
          <div>
            <h5 class="fw-bold mb-0">Eliminar Cuenta</h5>
            <p class="mb-0 extra-small opacity-75 text-uppercase fw-bold" style="letter-spacing: 0.5px;">Acción irreversible</p>
          </div>
        </div>

        <p class="text-muted small mb-4" style="line-height: 1.6;">
          Una vez que elimines tu cuenta, no hay marcha atrás. Todas tus tareas y datos se borrarán permanentemente de TASKPRO.
        </p>

        <div class="d-flex justify-content-start">
          <button (click)="onDelete()" class="btn btn-outline-danger fw-bold py-2 px-4 rounded-pill border-2" style="font-size: 0.85rem;">
            BORRAR MI CUENTA
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
