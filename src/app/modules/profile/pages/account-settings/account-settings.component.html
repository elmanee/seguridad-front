<div class="container py-5 mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm p-4 p-md-5" style="border-radius: 20px;">
        
        <form [formGroup]="profileForm" (ngSubmit)="onUpdate()">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="small fw-bold text-muted">NOMBRE</label>
              <input type="text" formControlName="name" class="form-control bg-light border-0 py-2">
            </div>
            <div class="col-md-6 mb-3">
              <label class="small fw-bold text-muted">APELLIDO</label>
              <input type="text" formControlName="lastname" class="form-control bg-light border-0 py-2">
            </div>
          </div>

          <div class="mb-3">
            <label class="small fw-bold text-muted">USUARIO</label>
            <input type="text" formControlName="username" class="form-control bg-light border-0 py-2">
          </div>

          <div class="mb-4">
            <label class="small fw-bold text-muted">NUEVA CONTRASEÑA (OPCIONAL)</label>
            <input type="password" formControlName="password" class="form-control bg-light border-0 py-2" placeholder="Dejar en blanco para no cambiar">
          </div>

          <div class="d-flex justify-content-end">
            <button type="submit" [disabled]="!isFormChanged || profileForm.invalid" 
                    class="btn btn-primary px-5 py-2 fw-bold shadow-sm" style="border-radius: 12px;">
              Guardar cambios
            </button>
          </div>
        </form>

        <hr class="my-5 opacity-10">

        <div class="p-4 rounded-4 border border-danger border-opacity-10" style="background-color: #fff5f5;">
          <div class="d-flex align-items-center mb-2">
            <i class="fa-solid fa-triangle-exclamation text-danger me-2 fs-5"></i>
            <h5 class="text-danger fw-bold m-0">Eliminar Cuenta</h5>
          </div>
          <p class="text-muted small mb-3">
            Al eliminar tu cuenta, se borrarán todos tus datos y tareas de forma irreversible. No hay marcha atrás.
          </p>
          
          <button (click)="onDelete()" class="btn btn-outline-danger btn-sm fw-bold px-4" style="border-radius: 10px;">
            Eliminar mi cuenta definitivamente
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
